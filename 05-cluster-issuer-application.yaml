apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: letsencrypt-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/devopsgp4/argocd.git
    targetRevision: HEAD
    path: cluster-issuer
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated: {}