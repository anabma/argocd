apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: technitium-letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: kianooshparnan5@gmail.com
    privateKeySecretRef:
      name: acme-letsencrypt-prod-key
    solvers:
    - dns01:
        webhook:
          groupName: acme.xver.cloud
          solverName: technitium
          config:
            serverUrl: https://ns1.chas-lab.dev
            authTokenSecretRef:
              name: technitium-api-token
              key: api-token
