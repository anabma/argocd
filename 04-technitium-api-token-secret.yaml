apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: technitium-api-token
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/DilSal/is-argo
    targetRevision: HEAD
    path: cluster-issuer
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated: {}