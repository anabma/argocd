apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  #name: technitium-letsencrypt-staging
  name: technitium-letsencrypt
  # NOTE: ClusterIssuer is cluster-scoped; do not set namespace here.
spec:
  acme:
    #server: https://acme-staging-v02.api.letsencrypt.org/directory
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dildar.sallabas@gmail.com
    privateKeySecretRef:
      #name: acme-letsencrypt-staging-key
      name: acme-letsencrypt-key
    solvers:
    - dns01:
        webhook:
          groupName: acme.xver.cloud
          solverName: technitium
          config:
            serverUrl: https://ns1.chas-lab.dev
            authTokenSecretRef:
              name: technitium-api-token
              key: api-token
              namespace: cert-manager
