apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: dildar.sallabas@gmail.com
    privateKeySecretRef:
      name: acme-letsencrypt-staging-key
    solvers:
      - dns01:
          rfc2136:
            nameserver: ns1.chas-lab.dev:53
            tsigKeyName: group-4.  # Replace with actual key name
            tsigAlgorithm: HMACSHA256  # Or your actual algorithm
            tsigSecretSecretRef:
              name: rfc2136-credentials
              key: tsig_secret-key