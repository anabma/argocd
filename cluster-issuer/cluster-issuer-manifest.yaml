# ClusterIssuer that defines how cert-manager will obtain certificates from Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dildar.sallabas@gmail.com
    privateKeySecretRef:
      name: acme-letsencrypt-key
    solvers:
      - dns01:
          # Dynamic DNS record updating/config using RFC2136 protocol
          rfc2136:
            nameserver: ns1.chas-lab.dev
            # Reference data for secret to access name server
            # TSIG used to authenticate DNS requests between servers
            tsigKeyName: group-4.
            tsigAlgorithm: HMACSHA256
            tsigSecretSecretRef:
              name: rfc2136-credentials
              # TSIG key created from CI variable defined in Playbook
              key: tsig_secret_key