apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    #repoURL: https://github.com/traefik/traefik-helm-chart
    repoURL: https://traefik.github.io/charts
    #path: traefik
    chart: traefik
    # NOTE: Update to the latest stable if desired.
    #targetRevision: "v37.0.0"
    targetRevision: "25.0.0"
    helm:
      values: |
        installCRDs: true
           providers:
             kubernetesCRD:
              allowCrossNamespace: true
             kubernetesIngress: 
              allowCrossNamespace: true
              
        service:
          type: NodePort
          ports:
            web:
              port: 80
              nodePort: 30080
            websecure:
              port: 443
              nodePort: 30443
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
