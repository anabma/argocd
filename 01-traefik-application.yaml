apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "25.0.0"
    helm:
      values: |
        installCRDs: true
        providers:
          kubernetesCRD:
            allowCrossNamespace: true
          kubernetesIngress: 
            allowCrossNamespace: true
        
        ports:
          web:
            port: 8000
            exposedPort: 80
          websecure:
            port: 8443
            exposedPort: 443
            # IMPORTANT: Don't force TLS here, let ingress handle it
            tls:
              enabled: true
              
        service:
          type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true