apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: argocd-tls
  dnsNames:
    - control-plane-1.group-4.doe24.chas-lab.dev 
    
  issuerRef:
    #name: technitium-letsencrypt-staging
    name: technitium-letsencrypt-staging
    kind: ClusterIssuer
  ignoreDifferences:
    - group: cert-manager.io
      kind: Certificate
      name: argocd-tls
      namespace: argocd
      jsonPointers:
        - /status
        - /metadata/finalizers